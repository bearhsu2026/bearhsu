<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SWAG - New User Tutorial</title>
    <style>
        :root {
            --bg-dark: #09090b; --brand-primary: #ff2a5f; --brand-secondary: #9d2aff;
            --text-main: #ffffff; --text-muted: rgba(255, 255, 255, 0.65);
            --glass-bg: rgba(24, 24, 27, 0.6); --glass-border: rgba(255, 255, 255, 0.08);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; line-height: 1.5; }

        .fluid-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden; background: var(--bg-dark); }
        .blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.35; animation: float 15s infinite alternate ease-in-out; }
        .blob-1 { top: -15%; left: -25%; width: 450px; height: 450px; background: var(--brand-primary); }
        .blob-2 { bottom: -15%; right: -25%; width: 500px; height: 500px; background: var(--brand-secondary); animation-delay: -7s; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 70px) scale(1.15); } }

        .container { position: relative; padding: 24px 20px 140px 20px; max-width: 600px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
        .header { display: flex; justify-content: flex-end; margin-bottom: 24px; }
        .lang-switcher { appearance: none; background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--glass-border); color: var(--text-main); padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; outline: none; }
        .hero-title { font-size: 1.8rem; font-weight: 800; margin-bottom: 12px; background: linear-gradient(135deg, #fff, var(--text-muted)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-subtitle { font-size: 1rem; color: var(--text-muted); margin-bottom: 24px; }

        .section-divider { height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent); margin: 36px 0 12px 0; }
        .section-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 16px; padding: 8px 16px; display: flex; align-items: center; gap: 8px; border-radius: 4px 16px 16px 4px; text-shadow: 0 1px 3px rgba(0,0,0,0.6); }
        .title-creators { background: linear-gradient(90deg, rgba(255, 42, 95, 0.4) 0%, rgba(255, 42, 95, 0) 100%); border-left: 5px solid var(--brand-primary); }
        .title-videos { background: linear-gradient(90deg, rgba(42, 134, 255, 0.4) 0%, rgba(42, 134, 255, 0) 100%); border-left: 5px solid #2a86ff; }
        .title-pack { background: linear-gradient(90deg, rgba(255, 215, 0, 0.4) 0%, rgba(255, 215, 0, 0) 100%); border-left: 5px solid #ffd700; color: #fff;}
        .title-pass { background: linear-gradient(90deg, rgba(157, 42, 255, 0.4) 0%, rgba(157, 42, 255, 0) 100%); border-left: 5px solid var(--brand-secondary); }

        .carousel-wrapper { position: relative; width: 100%; margin-top: 8px; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.7); color: white; border: 1px solid var(--glass-border); width: 36px; height: 36px; border-radius: 50%; cursor: pointer; z-index: 10; display: none; align-items: center; justify-content: center; }
        @media (hover: hover) { .nav-btn { display: flex; } }
        .nav-left { left: -14px; } .nav-right { right: -14px; }
        .horizontal-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 12px; margin: 0 -20px; padding: 0 20px; scroll-behavior: smooth; }
        .creator-card { flex: 0 0 132px; background: var(--glass-bg); backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-radius: 16px; padding: 16px 12px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .avatar { position: relative; width: 64px; height: 64px; border-radius: 50%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); display: flex; justify-content: center; align-items: center; margin-bottom: 10px; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .creator-name { font-size: 0.9rem; font-weight: 700; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 108px; }
        
        .video-grid { display: grid; grid-template-rows: repeat(4, auto); grid-auto-columns: 92%; grid-auto-flow: column; gap: 12px; overflow-x: auto; padding-bottom: 12px; scroll-behavior: smooth; }
        @media (min-width: 500px) { .video-grid { grid-auto-columns: 48%; } }
        .video-item { background: var(--glass-bg); backdrop-filter: blur(16px); border: 1px solid var(--glass-border); padding: 8px; border-radius: 12px; display: flex; gap: 12px; }
        .video-cover-container { position: relative; width: 140px; height: 80px; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
        .video-cover-container img { width: 100%; height: 100%; object-fit: cover; }
        .video-duration { position: absolute; bottom: 4px; right: 4px; background: rgba(0,0,0,0.75); color: #fff; font-size: 0.65rem; padding: 2px 5px; border-radius: 4px; font-weight: bold; }
        .video-info { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .video-title { font-size: 0.85rem; font-weight: 700; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .creator-dot { width: 24px; height: 24px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); object-fit: cover; cursor: pointer; }

        .banner-card { padding: 20px; border-radius: 16px; border: 1px solid var(--glass-border); backdrop-filter: blur(16px); margin-bottom: 24px; text-align: center; }
        .banner-card.gold { border-color: rgba(255, 215, 0, 0.3); background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(24, 24, 27, 0.8)); }
        .banner-card.purple { border-color: rgba(157, 42, 255, 0.3); background: linear-gradient(135deg, rgba(157, 42, 255, 0.1), rgba(24, 24, 27, 0.8)); }
        .promo-highlight { color: #ffd700; font-size: 1.1rem; font-weight: 900; }
        .promo-badge { background: #ff2a5f; color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 0.8rem; font-weight: 800; margin-left: 6px; }
        .disclaimer-text { font-size: 0.75rem; color: var(--text-muted); margin: 12px 0; }
        .pass-header-wrapper { display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 8px; margin-bottom: 12px; }
        .pass-title { color: #ffd700; font-weight: 800; font-size: 1rem; }
        .tag-purple { background: var(--brand-secondary); color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: 800; }
        
        .btn-sm { background: var(--brand-primary); color: #fff; border: none; padding: 6px 12px; border-radius: 100px; font-size: 0.8rem; font-weight: bold; cursor: pointer; width: 100%; margin-top: 6px; }
        .btn-full { display: inline-block; padding: 12px 24px; border-radius: 100px; border: none; font-size: 0.95rem; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none; min-width: 200px; }
        .gold-fill { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000; }
        .purple-fill { background: linear-gradient(135deg, var(--brand-secondary), #5a189a); color: #fff; }

        .cta-wrapper { position: fixed; bottom: 0; left: 0; width: 100%; padding: 20px 20px 32px 20px; background: linear-gradient(to top, #000000 70%, transparent); display: flex; justify-content: center; z-index: 100; }
        .cta-btn { width: 100%; max-width: 560px; padding: 16px; border-radius: 100px; border: none; background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary)); color: #fff; font-size: 1.15rem; font-weight: bold; cursor: pointer; animation: pulse-glow 2s infinite; }
        
        /* 【核心新增】按鈕掃光特效 */
        .btn-full, .cta-btn { position: relative; overflow: hidden; }
        .scroll-glow::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(to right, rgba(255, 255, 255, 0) 40%, rgba(255, 255, 255, 0.4) 50%, rgba(255, 255, 255, 0) 60%);
            transform: rotate(20deg);
            animation: scroll-shine 2s infinite ease-out;
        }
        @keyframes scroll-shine {
            from { left: -75%; }
            to { left: 100%; }
        }
    </style>
</head>
<body>

    <div class="fluid-bg"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>

    <div class="container">
        <div class="header">
            <select id="langSelect" class="lang-switcher" onchange="changeLanguage(this.value)">
                <option value="zh-TW">繁體中文</option><option value="zh-CN">简体中文</option><option value="en">English</option><option value="ja">日本語</option>
            </select>
        </div>

        <div id="real-content">
            <h1 class="hero-title" data-i18n="title"></h1>
            <p class="hero-subtitle" data-i18n="subtitle"></p>

            <div class="section-title title-creators" data-i18n="sec1_title"></div>
            <div class="carousel-wrapper">
                <button class="nav-btn nav-left" onclick="scrollCarousel('creator-list', -1)">&#10094;</button>
                <div class="horizontal-scroll" id="creator-list"></div>
                <button class="nav-btn nav-right" onclick="scrollCarousel('creator-list', 1)">&#10095;</button>
            </div>

            <div class="section-divider"></div>

            <div class="section-title title-videos" data-i18n="sec2_title"></div>
            <div class="carousel-wrapper">
                <button class="nav-btn nav-left" onclick="scrollCarousel('video-list', -1)">&#10094;</button>
                <div class="video-grid" id="video-list"></div>
                <button class="nav-btn nav-right" onclick="scrollCarousel('video-list', 1)">&#10095;</button>
            </div>

            <div class="section-divider"></div>

            <div class="section-title title-pack" data-i18n="sec3_title"></div>
            <div class="banner-card gold" data-glow-target="newbie-btn">
                <p style="margin-bottom: 12px;"><span class="promo-highlight" id="price-tag" data-i18n="sec3_desc"></span><span class="promo-badge">+1200%</span></p>
                <p class="disclaimer-text" data-i18n="sec3_disclaimer"></p>
                <a href="..." target="_blank" class="btn-full gold-fill" id="newbie-btn" data-i18n="btn_buy"></a>
            </div>

            <div class="section-title title-pass" data-i18n="sec4_title"></div>
            <div class="banner-card purple" data-glow-target="pass-btn">
                <div class="pass-header-wrapper">
                    <span class="pass-title" data-i18n="sec4_h1"></span>
                    <span class="tag-purple" data-i18n="tag_free"></span>
                </div>
                <p class="disclaimer-text" data-i18n="sec4_desc"></p>
                <a href="..." target="_blank" class="btn-full purple-fill" id="pass-btn" data-i18n="btn_details"></a>
            </div>
        </div>
    </div>

    <div class="cta-wrapper" data-glow-target="main-cta-btn">
        <button class="cta-btn" id="main-cta-btn" data-i18n="main_cta" onclick="handleMainCTAClick()"></button>
    </div>

    <script>
        const T = {
            'zh-TW': { title: '第一次玩 SWAG 就上手', subtitle: '簡單 3 步驟，立刻開啟你的專屬探索之旅。', sec1_title: '🔥 追蹤人氣女神', hot_tag: '🔥熱播', btn_follow: '立即追蹤', sec2_title: '🎬 熱門影片推薦', sec3_title: '💎 新手限定禮包', sec3_desc: '限量 $29 新手鑽石包，超高 CP 值！', sec3_disclaimer: '新用戶專屬福利，僅限註冊後 7 天內搶購！每項商品限購 1 次', btn_buy: '立即搶購', sec4_title: '🎟️ Battle Pass', tag_free: '免費參加', sec4_h1: '天天刷任務⚔️也能解鎖老司機好康', sec4_desc: '每天完成任務賺星星⭐提升等級就能解鎖專屬獎勵', btn_details: '立即解任務', main_cta: '天天領免費鑽石' },
            'zh-CN': { title: '第一次玩 SWAG 就上手', subtitle: '简单 3 步骤，立刻开启你的专属探索之旅。', sec1_title: '🔥 追踪人气女神', hot_tag: '🔥热播', btn_follow: '立即追踪', sec2_title: '🎬 热门影片推荐', sec3_title: '💎 新手限定礼包', sec3_desc: '限量 9.9 元 新手钻石包，超高 CP 值！', sec3_disclaimer: '新用户专属福利，仅限注册后 7 天内抢购！每项商品限购 1 次', btn_buy: '立即抢购', sec4_title: '🎟️ Battle Pass', tag_free: '免费参加', sec4_h1: '天天刷任务⚔️也能解锁老司机好康', sec4_desc: '每天完成任务赚星星⭐提升等级就能解锁专属奖励', btn_details: '立即解任务', main_cta: '天天领免费钻石' },
            'en': { title: 'Get Started with SWAG', subtitle: 'Follow 3 simple steps to start your exclusive journey.', sec1_title: '🔥 Top Creators', hot_tag: '🔥HOT', btn_follow: 'Follow', sec2_title: '🎬 Hot Videos', sec3_title: '💎 Newbie Pack', sec3_desc: 'Limited $29 Diamond Pack.', sec3_disclaimer: 'New user exclusive! Available for 7 days after registration. Limit 1 per item.', btn_buy: 'Buy Now', sec4_title: '🎟️ Battle Pass', tag_free: 'Free to Join', sec4_h1: 'Daily tasks⚔️ to unlock perks', sec4_desc: 'Complete daily tasks to earn stars⭐ and unlock rewards', btn_details: 'Start Tasks', main_cta: 'Claim Daily Diamonds' },
            'ja': { title: 'SWAGの始め方ガイド', subtitle: '簡単な3ステップで、あなただけの特別な体験を始めましょう。', sec1_title: '🔥 人気女神をフォロー', hot_tag: '🔥人気配信', btn_follow: 'フォロー', sec2_title: '🎬 おすすめ動画', sec3_title: '💎 初心者限定パック', sec3_desc: '限定$29ダイヤパック。', sec3_disclaimer: '新規ユーザー限定特典。登録後7日以内にご購入ください。各商品1回限り。', btn_buy: '今すぐ購入', sec4_title: '🎟️ バトルパス', tag_free: '無料参加', sec4_h1: '任務をこなして⚔️報酬を解除', sec4_desc: '毎日ミッションで星⭐をゲット！レベルアップして報酬を解除しよう', btn_details: '今すぐ解任務', main_cta: '毎日無料ダイヤを受け取る' }
        };

        function changeLanguage(lang) {
            const t = T[lang] || T['zh-TW'];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) el.textContent = t[key];
            });
            if(lang === 'zh-CN') document.getElementById('price-tag').textContent = '限量 9.9 元 新手钻石包，超高 CP 值！';
        }

        async function init() {
            try {
                const res = await fetch('https://api.swag.live/feeds/user_leaderboard_livestream_24h_a?limit=10&no-redirect=1&format=user');
                const list = (await res.json()).slice(0, 10);
                const container = document.getElementById('creator-list');
                list.forEach(u => {
                    const card = document.createElement('div');
                    card.className = 'creator-card';
                    card.innerHTML = `<div class="avatar"><img src="https://public.swag.live/users/${u.id}/picture.jpg?size=256x256&format=avif"></div>
                                      <div class="creator-name">${u.displayName || u.username}</div>
                                      <a href="https://swag.live/user/${u.id}" target="_blank" class="btn-sm" data-i18n="btn_follow"></a>`;
                    container.appendChild(card);
                });
            } catch(e) {}
            try {
                const res = await fetch('https://api.swag.live/feeds/flix_trending_free_video?page=1&limit=12');
                const list = (await res.json()).slice(0, 12);
                const container = document.getElementById('video-list');
                list.forEach(v => {
                    const card = document.createElement('div');
                    card.className = 'video-item';
                    const dur = v.metadata?.duration || v.assets?.[0]?.duration || 0;
                    card.innerHTML = `<a href="https://swag.live/post/${v.id}" target="_blank" style="display:contents; color:inherit; text-decoration:none;">
                                      <div class="video-cover-container"><img src="https://public.swag.live/messages/${v.id}/poster.jpg?size=256x256&format=avif&preset=sd"></div>
                                      <div class="video-info"><div class="video-title">${v.caption}</div>
                                      <a href="https://swag.live/user/${v.sender}" target="_blank"><img class="creator-dot" src="https://public.swag.live/users/${v.sender}/picture.jpg?size=64x64"></a></div>
                                      </a>`;
                    container.appendChild(card);
                });
            } catch(e) {}
            changeLanguage(document.getElementById('langSelect').value);
        }

        // 滾動觸發掃光特效
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const targetId = entry.target.dataset.glowTarget;
                const targetBtn = document.getElementById(targetId);
                if (targetBtn) {
                    if (entry.isIntersecting) targetBtn.classList.add('scroll-glow');
                    else targetBtn.classList.remove('scroll-glow');
                }
            });
        }, { threshold: 0.5 }); // 當元素 50% 可見時觸發

        document.querySelectorAll('[data-glow-target]').forEach(el => observer.observe(el));
        
        // 其他功能保留
        document.addEventListener('click', e => {
            const a = e.target.closest('a[target="_blank"]');
            if (a) {
                try {
                    const u = new URL(a.href);
                    if (u.hostname === 'swag.live' || u.hostname === 'www.swag.live') {
                        e.preventDefault();
                        if (window.self !== window.top) window.parent.postMessage({ type: 'PWA_NAVIGATE', url: a.href }, '*');
                        else window.location.href = a.href;
                    }
                } catch(err){}
            }
        });
        function scrollCarousel(id, dir) { const el = document.getElementById(id); el.scrollBy({ left: dir * el.clientWidth * 0.8, behavior: 'smooth' }); }
        function handleMainCTAClick() {
            const url = 'https://swag.live/?campaign-id=open-modal&campaign=eyJtb2RhbElkIjoiQmFja3BhY2tNb2RhbCJ9';
            if (window.self !== window.top) window.parent.postMessage({ type: 'PWA_NAVIGATE', url: url }, '*');
            else window.location.href = url;
        }
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
