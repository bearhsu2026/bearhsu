<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SWAG - New User Tutorial</title>
    <style>
        :root {
            --bg-dark: #09090b; --brand-primary: #ff2a5f; --brand-secondary: #9d2aff;
            --text-main: #ffffff; --text-muted: rgba(255, 255, 255, 0.65);
            --glass-bg: rgba(24, 24, 27, 0.6); --glass-border: rgba(255, 255, 255, 0.08);
            --skeleton-bg: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; line-height: 1.5; }

        .fluid-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden; background: var(--bg-dark); }
        .blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.35; animation: float 15s infinite alternate ease-in-out; }
        .blob-1 { top: -15%; left: -25%; width: 450px; height: 450px; background: var(--brand-primary); }
        .blob-2 { bottom: -15%; right: -25%; width: 500px; height: 500px; background: var(--brand-secondary); animation-delay: -7s; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 70px) scale(1.15); } }

        .container { position: relative; padding: 24px 20px 140px 20px; max-width: 600px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
        .header { display: flex; justify-content: flex-end; margin-bottom: 24px; }
        .lang-switcher { appearance: none; background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--glass-border); color: var(--text-main); padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; outline: none; }
        .hero-title { font-size: 1.8rem; font-weight: 800; margin-bottom: 12px; background: linear-gradient(135deg, #fff, var(--text-muted)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-subtitle { font-size: 1rem; color: var(--text-muted); margin-bottom: 24px; }

        /* Sections */
        .section-divider { height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent); margin: 36px 0 12px 0; }
        .section-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 16px; padding: 8px 16px; display: inline-flex; align-items: center; gap: 8px; border-radius: 4px 16px 16px 4px; text-shadow: 0 1px 3px rgba(0,0,0,0.6); }
        .title-creators { background: linear-gradient(90deg, rgba(255, 42, 95, 0.4) 0%, rgba(255, 42, 95, 0) 80%); border-left: 5px solid var(--brand-primary); }
        .title-videos { background: linear-gradient(90deg, rgba(42, 134, 255, 0.4) 0%, rgba(42, 134, 255, 0) 80%); border-left: 5px solid #2a86ff; }
        .title-pack { background: linear-gradient(90deg, rgba(255, 215, 0, 0.4) 0%, rgba(255, 215, 0, 0) 80%); border-left: 5px solid #ffd700; color: #fff;}
        .title-pass { background: linear-gradient(90deg, rgba(157, 42, 255, 0.4) 0%, rgba(157, 42, 255, 0) 80%); border-left: 5px solid var(--brand-secondary); }

        /* Components */
        .carousel-wrapper { position: relative; width: 100%; margin-top: 8px; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.7); color: white; border: 1px solid var(--glass-border); width: 36px; height: 36px; border-radius: 50%; cursor: pointer; z-index: 10; display: none; align-items: center; justify-content: center; }
        @media (hover: hover) { .nav-btn { display: flex; } }
        .nav-left { left: -14px; } .nav-right { right: -14px; }
        .horizontal-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 12px; scroll-snap-type: x mandatory; margin: 0 -20px; padding: 0 20px; scroll-behavior: smooth; }
        .creator-card { flex: 0 0 132px; scroll-snap-align: start; background: var(--glass-bg); backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-radius: 16px; padding: 16px 12px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .avatar { position: relative; width: 64px; height: 64px; border-radius: 50%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); display: flex; justify-content: center; align-items: center; margin-bottom: 10px; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .creator-name { font-size: 0.9rem; font-weight: 700; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 108px; }
        
        .video-grid { display: grid; grid-template-rows: repeat(4, auto); grid-auto-columns: 92%; grid-auto-flow: column; gap: 12px; overflow-x: auto; scroll-snap-type: x mandatory; padding-bottom: 12px; scroll-behavior: smooth; }
        @media (min-width: 500px) { .video-grid { grid-auto-columns: 48%; } }
        .video-item { scroll-snap-align: start; background: var(--glass-bg); backdrop-filter: blur(16px); border: 1px solid var(--glass-border); padding: 8px; border-radius: 12px; display: flex; gap: 12px; cursor: pointer; }
        .video-cover-container { position: relative; width: 140px; height: 80px; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
        .video-cover-container img { width: 100%; height: 100%; object-fit: cover; }
        .video-duration { position: absolute; bottom: 4px; right: 4px; background: rgba(0,0,0,0.75); color: #fff; font-size: 0.65rem; padding: 2px 5px; border-radius: 4px; font-weight: bold; }
        .video-title { font-size: 0.85rem; font-weight: 700; line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .banner-card { padding: 20px; border-radius: 16px; border: 1px solid var(--glass-border); backdrop-filter: blur(16px); margin-bottom: 24px; text-align: center; }
        .banner-card.gold { border-color: rgba(255, 215, 0, 0.3); background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(24, 24, 27, 0.8)); }
        .banner-card.purple { border-color: rgba(157, 42, 255, 0.3); background: linear-gradient(135deg, rgba(157, 42, 255, 0.1), rgba(24, 24, 27, 0.8)); }
        
        /* Highlight Promo Styles */
        .promo-highlight { color: #ffd700; font-size: 1.1rem; font-weight: 900; }
        .promo-badge { background: #ff2a5f; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 0.85rem; font-weight: 800; display: inline-block; margin-left: 6px; vertical-align: middle; }
        
        .disclaimer-text { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 16px; }
        .pass-text { display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 0.85rem; margin-bottom: 16px; }
        .pass-text img { width: 20px; height: 20px; }

        .btn-sm { background: var(--brand-primary); color: #fff; border: none; padding: 6px 12px; border-radius: 100px; font-size: 0.8rem; font-weight: bold; cursor: pointer; width: 100%; margin-top: 6px; }
        .btn-full { display: inline-block; padding: 12px 24px; border-radius: 100px; border: none; font-size: 0.95rem; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none; min-width: 200px; }
        .gold-fill { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000; }
        .purple-fill { background: linear-gradient(135deg, var(--brand-secondary), #5a189a); color: #fff; }

        .cta-wrapper { position: fixed; bottom: 0; left: 0; width: 100%; padding: 20px 20px 32px 20px; background: linear-gradient(to top, #000000 70%, transparent); display: flex; flex-direction: column; align-items: center; z-index: 100; }
        .cta-btn { width: 100%; max-width: 560px; padding: 16px; border-radius: 100px; border: none; background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary)); color: #fff; font-size: 1.15rem; font-weight: bold; cursor: pointer; animation: pulse-glow 2s infinite; }
        @keyframes pulse-glow { 0% { box-shadow: 0 0 0 0 rgba(255, 42, 95, 0.5); } 70% { box-shadow: 0 0 0 15px rgba(255, 42, 95, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 42, 95, 0); } }
    </style>
</head>
<body>

    <div class="fluid-bg"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>

    <div class="container">
        <div class="header">
            <select id="langSelect" class="lang-switcher" onchange="changeLanguage(this.value)">
                <option value="zh-TW">繁體中文</option><option value="zh-CN">简体中文</option><option value="en">English</option><option value="ja">日本語</option>
            </select>
        </div>

        <div id="real-content">
            <h1 class="hero-title" data-i18n="title"></h1>
            <p class="hero-subtitle" data-i18n="subtitle"></p>

            <div class="section-title title-creators" data-i18n="sec1_title"></div>
            <div class="carousel-wrapper">
                <button class="nav-btn nav-left" onclick="scrollCarousel('creator-list', -1)">&#10094;</button>
                <div class="horizontal-scroll" id="creator-list"></div>
                <button class="nav-btn nav-right" onclick="scrollCarousel('creator-list', 1)">&#10095;</button>
            </div>

            <div class="section-divider"></div>

            <div class="section-title title-videos" data-i18n="sec2_title"></div>
            <div class="carousel-wrapper">
                <button class="nav-btn nav-left" onclick="scrollCarousel('video-list', -1)">&#10094;</button>
                <div class="video-grid" id="video-list"></div>
                <button class="nav-btn nav-right" onclick="scrollCarousel('video-list', 1)">&#10095;</button>
            </div>

            <div class="section-divider"></div>

            <div class="section-title title-pack" data-i18n="sec3_title"></div>
            <div class="banner-card gold">
                <!-- 【修正】金額文字與 +1200% badge -->
                <p style="margin-bottom: 12px;">
                    <span class="promo-highlight" data-i18n="sec3_desc"></span>
                    <span class="promo-badge">+1200%</span>
                </p>
                <p class="disclaimer-text" data-i18n="sec3_disclaimer"></p>
                <a href="https://swag.live/?campaign-id=checkout-diamondpack&campaign=eyJzZWN0aW9ucyI6WyJzZWN0aW9uPW51X3BhY2tfc2V0LXNlY3Rpb24iXX0=" target="_blank" class="btn-full gold-fill" data-i18n="btn_buy"></a>
            </div>

            <div class="section-title title-pass" data-i18n="sec4_title"></div>
            <div class="banner-card purple">
                <p class="pass-text" data-i18n="sec4_desc"><img src="https://public-ws.swag.live/notifications/shop-ad/img-Diamond_1.svg" alt="diamond"></p>
                <a href="https://swag.live/iframe?source=https://swag.live/battlepass/index.html" target="_blank" class="btn-full purple-fill" data-i18n="btn_details"></a>
            </div>
        </div>
    </div>

    <div class="cta-wrapper">
        <button class="cta-btn" data-i18n="main_cta" onclick="handleMainCTAClick()"></button>
    </div>

    <script>
        document.addEventListener('click', function(e) {
            const anchor = e.target.closest('a[target="_blank"]');
            if (!anchor) return;
            try {
                const url = new URL(anchor.href);
                if (url.hostname === 'swag.live' || url.hostname === 'www.swag.live') {
                    e.preventDefault();
                    if (window.self !== window.top) window.parent.postMessage({ type: 'PWA_NAVIGATE', url: anchor.href }, '*');
                    else window.location.href = anchor.href;
                }
            } catch (err) {}
        });

        const TRANSLATIONS = {
            'zh-TW': { title: '第一次玩 SWAG 就上手', subtitle: '簡單 3 步驟，立刻開啟你的專屬探索之旅。', sec1_title: '🔥 追蹤人氣女神', hot_tag: '🔥熱播', btn_follow: '立即追蹤', sec2_title: '🎬 熱門影片推薦', sec3_title: '💎 新手限定禮包', sec3_desc: '限量 $29 新手鑽石包，超高 CP 值！', sec3_disclaimer: '新用戶專屬福利，僅限註冊後 7 天內搶購！每項商品限購 1 次', btn_buy: '立即搶購', sec4_title: '🎟️ Battle Pass', sec4_desc: '每天完成任務賺取星星⭐提升等級就能解鎖專屬獎勵', btn_details: '查看詳情', main_cta: '立即領取免費鑽石' },
            'en': { title: 'Get Started with SWAG', subtitle: 'Follow 3 simple steps to start your exclusive journey.', sec1_title: '🔥 Top Creators', hot_tag: '🔥HOT', btn_follow: 'Follow', sec2_title: '🎬 Hot Videos', sec3_title: '💎 Newbie Pack', sec3_desc: 'Limited $29 Diamond Pack.', sec3_disclaimer: 'New user exclusive! Available for 7 days after registration. Limit 1 per item.', btn_buy: 'Buy Now', sec4_title: '🎟️ Battle Pass', sec4_desc: 'Complete daily tasks to earn stars⭐ and unlock rewards', btn_details: 'View Details', main_cta: 'Claim Free Diamonds' }
        };

        function changeLanguage(lang) {
            const t = TRANSLATIONS[lang] || TRANSLATIONS['zh-TW'];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) el.textContent = t[key];
            });
        }

        function scrollCarousel(id, dir) {
            const el = document.getElementById(id);
            el.scrollBy({ left: dir * el.clientWidth * 0.8, behavior: 'smooth' });
        }

        async function init() {
            try {
                const res = await fetch('https://api.swag.live/feeds/user_leaderboard_livestream_24h_a?limit=10&no-redirect=1&format=user');
                const data = await res.json();
                const list = (data.users || data.data || data).slice(0, 10);
                const container = document.getElementById('creator-list');
                list.forEach(u => {
                    const card = document.createElement('div');
                    card.className = 'creator-card';
                    card.innerHTML = `<div class="avatar"><img src="https://public.swag.live/users/${u.id}/picture.jpg?size=256x256&format=avif"></div>
                                      <div class="creator-name">${u.displayName || u.username}</div>
                                      <a href="https://swag.live/user/${u.id}" target="_blank" class="btn-sm" data-i18n="btn_follow"></a>`;
                    container.appendChild(card);
                });
            } catch(e) {}

            try {
                const res = await fetch('https://api.swag.live/feeds/flix_trending_free_video?page=1&limit=12');
                const data = await res.json();
                const list = (data.data || data).slice(0, 12);
                const container = document.getElementById('video-list');
                list.forEach(v => {
                    const card = document.createElement('div');
                    card.className = 'video-item';
                    const dur = v.metadata?.duration || v.assets?.[0]?.duration || 0;
                    card.innerHTML = `<a href="https://swag.live/post/${v.id}" target="_blank" style="display:contents; color:inherit; text-decoration:none;">
                                      <div class="video-cover-container"><img src="https://public.swag.live/messages/${v.id}/poster.jpg?size=256x256&format=avif&preset=sd">
                                      <div class="video-duration">${Math.floor(dur/60)}:${(dur%60).toString().padStart(2,'0')}</div></div>
                                      <div class="video-info"><div class="video-title">${v.caption}</div></div></a>`;
                    container.appendChild(card);
                });
            } catch(e) {}
            changeLanguage(document.getElementById('langSelect').value);
        }

        function handleMainCTAClick() {
            const url = 'https://swag.live/?campaign-id=open-modal&campaign=eyJtb2RhbElkIjoiQmFja3BhY2tNb2RhbCJ9';
            if (window.self !== window.top) window.parent.postMessage({ type: 'PWA_NAVIGATE', url: url }, '*');
            else window.location.href = url;
        }

        document.addEventListener('DOMContentLoaded', () => {
            const bLang = navigator.language || 'zh-TW';
            let dLang = 'zh-TW';
            if (bLang.startsWith('zh-CN')) dLang = 'zh-CN';
            else if (bLang.startsWith('en')) dLang = 'en';
            else if (bLang.startsWith('ja')) dLang = 'ja';
            document.getElementById('langSelect').value = dLang;
            init();
        });
    </script>
</body>
</html>
