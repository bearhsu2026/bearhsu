        /* ==========================================
           1. CSS Variables & Reset (Mobile First)
           ========================================== */
        :root {
            --bg-dark: #09090b;
            --brand-primary: #ff2a5f;
            --brand-secondary: #9d2aff;
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.65);
            --glass-bg: rgba(24, 24, 27, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --skeleton-bg: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* ==========================================
           2. Modern Dark Mode & Fluid Background
           ========================================== */
        .fluid-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; overflow: hidden; background: var(--bg-dark);
        }

        .blob {
            position: absolute; border-radius: 50%; filter: blur(60px);
            opacity: 0.4; animation: float 12s infinite alternate ease-in-out;
        }

        .blob-1 { top: -10%; left: -20%; width: 300px; height: 300px; background: var(--brand-primary); }
        .blob-2 { bottom: -10%; right: -20%; width: 350px; height: 350px; background: var(--brand-secondary); animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, 60px) scale(1.1); }
        }

        /* ==========================================
           3. Layout & Header
           ========================================== */
        .container {
            position: relative; padding: 24px 20px 140px 20px;
            max-width: 600px; margin: 0 auto; min-height: 100vh;
            display: flex; flex-direction: column;
        }

        .header { display: flex; justify-content: flex-end; margin-bottom: 24px; }

        .lang-switcher {
            appearance: none; background: var(--glass-bg);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); color: var(--text-main);
            padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; outline: none;
        }

        .hero-title {
            font-size: 1.8rem; font-weight: 800; margin-bottom: 12px;
            background: linear-gradient(135deg, #fff, var(--text-muted));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .hero-subtitle { font-size: 1rem; color: var(--text-muted); margin-bottom: 24px; }

        /* ==========================================
           4. Enhanced Content Sections (Colored Headers)
           ========================================== */
        .section-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            margin: 36px 0 12px 0;
        }

        .section-title {
            font-size: 1.1rem; font-weight: 800;
            margin: 0 0 16px 0; padding: 8px 16px;
            display: inline-flex; align-items: center; gap: 8px;
            border-radius: 4px 16px 16px 4px;
            width: max-content; max-width: 100%;
            text-shadow: 0 1px 3px rgba(0,0,0,0.6);
        }
        
        .title-creators { background: linear-gradient(90deg, rgba(255, 42, 95, 0.4), transparent); border-left: 5px solid var(--brand-primary); }
        .title-videos { background: linear-gradient(90deg, rgba(42, 134, 255, 0.4), transparent); border-left: 5px solid #2a86ff; }
        .title-pack { background: linear-gradient(90deg, rgba(255, 215, 0, 0.4), transparent); border-left: 5px solid #ffd700; color: #fff;}
        .title-pass { background: linear-gradient(90deg, rgba(157, 42, 255, 0.4), transparent); border-left: 5px solid var(--brand-secondary); }

        /* Section 1: Creators */
        .horizontal-scroll {
            display: flex; gap: 12px; overflow-x: auto; padding-bottom: 12px;
            scroll-snap-type: x mandatory; margin-right: -20px; padding-right: 20px;
        }
        .horizontal-scroll::-webkit-scrollbar { display: none; }
        
        .creator-card {
            flex: 0 0 132px; scroll-snap-align: start;
            background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); border-radius: 16px; padding: 16px 12px;
            display: flex; flex-direction: column; align-items: center; text-align: center;
        }
        
        .avatar {
            position: relative; width: 64px; height: 64px; border-radius: 50%;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border: 1px solid var(--glass-border);
            display: flex; justify-content: center; align-items: center; margin-bottom: 10px;

        .avatar img { position: relative; z-index: 1; width: 100%; height: 100%; object-fit: cover; border-radius: 50%; color: transparent; }
        
        .creator-name {

        /* Section 2: Video List */
        .video-list { display: flex; flex-direction: column; gap: 8px; }

            background: var(--glass-bg); backdrop-filter: blur(16px); border: 1px solid var(--glass-border);
            padding: 12px; border-radius: 12px; display: flex; align-items: center; gap: 12px;

        .video-cover {

        }
        .video-title { font-size: 0.9rem; font-weight: 500; }
        .video-title.highlight { color: #ffd700; font-weight: 700; }

        /* Section 3 & 4: Promo Banners */
        .banner-card {
            padding: 20px; border-radius: 16px; border: 1px solid var(--glass-border); backdrop-filter: blur(16px);
        }
        .banner-card.gold { border-color: rgba(255, 215, 0, 0.3); background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(24, 24, 27, 0.8)); }
        .banner-card.purple { border-color: rgba(157, 42, 255, 0.3); background: linear-gradient(135deg, rgba(157, 42, 255, 0.1), rgba(24, 24, 27, 0.8)); }
        .banner-card p { font-size: 0.95rem; color: #fff; margin-bottom: 16px; line-height: 1.6; }

        /* Buttons */
        .btn-sm {
            background: var(--brand-primary); color: #fff; border: none; padding: 6px 12px;
            border-radius: 100px; font-size: 0.8rem; font-weight: bold; cursor: pointer; width: 100%;
        }
        .btn-full { width: 100%; padding: 12px; border-radius: 100px; border: none; font-size: 0.95rem; font-weight: bold; cursor: pointer; text-align: center; }
        .btn-full.outline { background: rgba(255,255,255,0.05); border: 1px solid var(--brand-primary); color: var(--brand-primary); margin-top: 8px; }
        .btn-full.gold-fill { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000; box-shadow: 0 4px 15px rgba(255, 215, 0, 0.2); }
        .btn-full.purple-fill { background: linear-gradient(135deg, var(--brand-secondary), #5a189a); color: #fff; box-shadow: 0 4px 15px rgba(157, 42, 255, 0.2); }

           5. Floating Main CTA

        .cta-wrapper {

            box-shadow: 0 8px 32px rgba(255, 42, 95, 0.4); cursor: pointer; animation: pulse-glow 2s infinite; transition: transform 0.1s;

        .cta-btn:active { transform: scale(0.97); }
        .footer-text { font-size: 0.7rem; color: var(--text-muted); margin-top: 12px; text-align: center; }

        @keyframes pulse-glow { 0% { box-shadow: 0 0 0 0 rgba(255, 42, 95, 0.5); } 70% { box-shadow: 0 0 0 15px rgba(255, 42, 95, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 42, 95, 0); } }

        /* ==========================================
           6. Skeleton Loading & Transition
           ========================================== */
        .skeleton-block {
            background: linear-gradient(90deg, var(--skeleton-bg) 25%, rgba(255,255,255,0.2) 50%, var(--skeleton-bg) 75%);
            background-size: 400% 100%; animation: skeleton-loading 1.5s infinite; border-radius: 8px;

        @keyframes skeleton-loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        #real-content { opacity: 0; transition: opacity 0.6s ease-in-out; display: none; }
        .show-content { opacity: 1 !important; display: block !important; }
    </style>

        function getUserId() {
            try { const params = new URLSearchParams(window.location.search); if (params.has('user_id')) return params.get('user_id'); } catch (e) { }
            try { const hashParams = new URLSearchParams(window.location.hash.substring(1)); if (hashParams.has('user_id')) return hashParams.get('user_id'); } catch (e) { }
            try { if (window.parent !== window) { const parentUrl = new URL(window.parent.location.href); if (parentUrl.searchParams.has('user_id')) return parentUrl.searchParams.get('user_id'); } } catch (e) { }
            try { if (document.referrer) { const refUrl = new URL(document.referrer); if (refUrl.searchParams.has('user_id')) return refUrl.searchParams.get('user_id'); } } catch (e) { }
            try { const match = window.location.href.match(/[?&#]user_id=([^&#]+)/i); if (match && match[1]) return match[1]; } catch (e) { }

        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag]));
        }

        // 深度遞迴掃描：無懼外層被包裝，直接尋找真實的 User 陣列
        function findUsersArray(obj) {
            if (Array.isArray(obj)) {
                if (obj.length > 0 && obj[0] && obj[0].id && (obj[0].username || obj[0].displayName)) {
                    return obj;
                }
                let unwrapped = obj.map(item => (item && typeof item === 'object') ? (item.user || item.actor || item) : null).filter(u => u && u.id);
                if (unwrapped.length > 0) return unwrapped;
            } else if (obj && typeof obj === 'object') {
                for (const key in obj) {
                    if (Array.isArray(obj[key]) || typeof obj[key] === 'object') {
                        let res = findUsersArray(obj[key]);
                        if (res && res.length > 0) return res;
                    }
                }
            }
            return[];
        }

                const safeName = escapeHTML(rawName);
                const streamerId = user.id;

                const card = document.createElement('div');
                card.className = 'creator-card';
                card.innerHTML = `
                    <div class="avatar">
                        <span>👤</span>
                        <img src="${imgUrl}" alt="${safeName}" onerror="this.style.opacity='0'">
                    </div>
                    <div class="creator-name" title="${safeName}">${safeName}</div>
                    <div class="badge">${tagText}</div>
                    <button class="btn-sm" onclick="handleStreamerClick('${streamerId}')">${btnText}</button>
                `;
                listContainer.appendChild(card);
            });
        }

        function changeLanguage(lang) {
            const texts = TRANSLATIONS[lang] || TRANSLATIONS['zh-TW'];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (texts[key]) el.textContent = texts[key];
            });
            if (globalStreamersData.length > 0) renderStreamers();
        }

        function _redirectWithSafeguard(targetUrl) {
            try {
                if (window.top && window.top !== window) window.top.location.href = targetUrl;
                else window.location.href = targetUrl;
            } catch (e) {
                window.location.href = targetUrl;
            }
        }

        function handleStreamerClick(streamerId) {
            const userId = getUserId();
            let url = `https://swag.live/user/${streamerId}?campaign-id=nu_free_diamonds`;
            if (userId) url += `&user_id=${encodeURIComponent(userId)}`;
            _redirectWithSafeguard(url);
        }

        function handleMainCTAClick() {
            const userId = getUserId();
            let url = `https://swag.live/?campaign-id=nu_free_diamonds`;
            if (userId) url += `&user_id=${encodeURIComponent(userId)}`;
            _redirectWithSafeguard(url);
        }

        document.addEventListener("DOMContentLoaded", () => {
            const browserLang = navigator.language || navigator.userLanguage;
            let defaultLang = 'zh-TW';
            if (browserLang.includes('zh-CN')) defaultLang = 'zh-CN';
            else if (browserLang.includes('en')) defaultLang = 'en';
            else if (browserLang.includes('ja')) defaultLang = 'ja';
            
            document.getElementById('langSelect').value = defaultLang;
            changeLanguage(defaultLang);

            fetchStreamers();

            setTimeout(() => {
                document.getElementById('skeleton-view').style.display = 'none';
                const realContent = document.getElementById('real-content');
                const ctaContainer = document.getElementById('cta-container');
                
                realContent.classList.add('show-content');
                ctaContainer.style.display = 'flex';
                
                setTimeout(() => { ctaContainer.style.opacity = '1'; }, 50);
            }, 800);
        });
    </script>
</body>
</html>
