<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SWAG - New User Tutorial</title>
    <style>
        /* ==========================================
           1. CSS Variables & Reset (Mobile First)
           ========================================== */
        :root {
            --bg-dark: #09090b;
            --brand-primary: #ff2a5f;
            --brand-secondary: #9d2aff;
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.65);
            --glass-bg: rgba(24, 24, 27, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --skeleton-bg: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* ==========================================
           2. Modern Dark Mode & Fluid Background
           ========================================== */
        .fluid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: var(--bg-dark);
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.4;
            animation: float 12s infinite alternate ease-in-out;
        }

        .blob-1 {
            top: -10%; left: -20%;
            width: 300px; height: 300px;
            background: var(--brand-primary);
        }

        .blob-2 {
            bottom: -10%; right: -20%;
            width: 350px; height: 350px;
            background: var(--brand-secondary);
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, 60px) scale(1.1); }
        }

        /* ==========================================
           3. Layout & Glassmorphism UI
           ========================================== */
        .container {
            position: relative;
            padding: 24px 20px 120px 20px; /* Bottom padding for floating CTA */
            max-width: 600px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 24px;
        }

        .lang-switcher {
            appearance: none;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            outline: none;
        }

        .hero-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-subtitle {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 32px;
        }

        .step-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            display: flex;
            align-items: flex-start;
            gap: 16px;
            transition: transform 0.2s ease;
        }

        .step-icon {
            font-size: 1.5rem;
            background: rgba(255, 255, 255, 0.1);
            width: 40px; height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            flex-shrink: 0;
        }

        .step-text {
            font-size: 0.95rem;
            font-weight: 500;
            margin-top: 4px;
        }

        /* ==========================================
           4. Floating CTA
           ========================================== */
        .cta-wrapper {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px 20px 32px 20px;
            background: linear-gradient(to top, #000000 30%, transparent);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 100;
        }

        .cta-btn {
            width: 100%;
            max-width: 560px;
            padding: 16px;
            border-radius: 100px;
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
            color: #fff;
            font-size: 1.15rem;
            font-weight: bold;
            border: none;
            box-shadow: 0 8px 32px rgba(255, 42, 95, 0.4);
            cursor: pointer;
            animation: pulse-glow 2s infinite;
            transition: transform 0.1s;
        }

        .cta-btn:active {
            transform: scale(0.97);
        }

        .footer-text {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 12px;
            text-align: center;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(255, 42, 95, 0.5); }
            70% { box-shadow: 0 0 0 15px rgba(255, 42, 95, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 42, 95, 0); }
        }

        /* ==========================================
           5. Skeleton Loading
           ========================================== */
        .skeleton-block {
            background: linear-gradient(90deg, var(--skeleton-bg) 25%, rgba(255,255,255,0.2) 50%, var(--skeleton-bg) 75%);
            background-size: 400% 100%;
            animation: skeleton-loading 1.5s infinite;
            border-radius: 8px;
        }

        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        #real-content {
            opacity: 0;
            transition: opacity 0.6s ease-in-out;
            display: none;
        }

        .show-content {
            opacity: 1 !important;
            display: block !important;
        }
    </style>
</head>
<body>

    <!-- Fluid Animated Background -->
    <div class="fluid-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Language Switcher -->
        <div class="header">
            <select id="langSelect" class="lang-switcher" onchange="changeLanguage(this.value)">
                <option value="zh-TW">繁體中文</option>
                <option value="zh-CN">简体中文</option>
                <option value="en">English</option>
                <option value="ja">日本語</option>
            </select>
        </div>

        <!-- Skeleton Loading View -->
        <div id="skeleton-view">
            <div class="skeleton-block" style="width: 80%; height: 36px; margin-bottom: 12px;"></div>
            <div class="skeleton-block" style="width: 60%; height: 36px; margin-bottom: 12px;"></div>
            <div class="skeleton-block" style="width: 100%; height: 20px; margin-bottom: 8px;"></div>
            <div class="skeleton-block" style="width: 90%; height: 20px; margin-bottom: 32px;"></div>
            
            <div class="skeleton-block" style="width: 100%; height: 80px; margin-bottom: 16px; border-radius: 16px;"></div>
            <div class="skeleton-block" style="width: 100%; height: 80px; margin-bottom: 16px; border-radius: 16px;"></div>
            <div class="skeleton-block" style="width: 100%; height: 80px; margin-bottom: 16px; border-radius: 16px;"></div>
        </div>

        <!-- Real Content View -->
        <div id="real-content">
            <h1 class="hero-title" data-i18n="title"></h1>
            <p class="hero-subtitle" data-i18n="subtitle"></p>

            <div class="step-card">
                <div class="step-icon">🎥</div>
                <div class="step-text" data-i18n="step1"></div>
            </div>

            <div class="step-card">
                <div class="step-icon">🔥</div>
                <div class="step-text" data-i18n="step2"></div>
            </div>

            <div class="step-card">
                <div class="step-icon">💎</div>
                <div class="step-text" data-i18n="step3"></div>
            </div>
        </div>
    </div>

    <!-- Floating Bottom CTA -->
    <div class="cta-wrapper" id="cta-container" style="display: none;">
        <button class="cta-btn" data-i18n="cta" onclick="handleCTAClick()"></button>
        <div class="footer-text" data-i18n="footer"></div>
    </div>

    <!-- ==========================================
         JavaScript Logic (Zero Dependencies)
         ========================================== -->
    <script>
        // 1. Translations Dictionary
        const TRANSLATIONS = {
            'zh-TW': {
                title: '歡迎來到 SWAG！新手快速指南',
                subtitle: '只需 1 分鐘，掌握老司機的快樂秘訣，還能領取專屬免費鑽石！',
                step1: '進入免費直播間，與心儀的主播零距離互動！',
                step2: '探索海量長片與限時動態，解鎖最私密的誘惑內容！',
                step3: '點擊下方按鈕，領取您的免費鑽石，馬上開始體驗！',
                cta: '立即領取免費鑽石',
                footer: 'Copyright © 2026 SWAG. 領取資格限註冊 24 小時內之新用戶。'
            },
            'zh-CN': {
                title: '欢迎来到 SWAG！新手快速指南',
                subtitle: '只需 1 分钟，掌握老司机的快乐秘诀，还能领取专属免费钻石！',
                step1: '进入免费直播间，与心仪的主播零距离互动！',
                step2: '探索海量长片与限时动态，解锁最私密的诱惑内容！',
                step3: '点击下方按钮，领取您的免费钻石，马上开始体验！',
                cta: '立即领取免费钻石',
                footer: 'Copyright © 2026 SWAG. 领取资格限注册 24 小时内之新用户。'
            },
            'en': {
                title: 'Welcome to SWAG! Quick Guide',
                subtitle: 'Master the secrets of joy in 1 minute & claim exclusive free diamonds!',
                step1: 'Join free live streams and interact with your favorite creators!',
                step2: 'Explore massive videos and stories to unlock private seductive content!',
                step3: 'Click the button below to claim free diamonds and start now!',
                cta: 'Claim Free Diamonds',
                footer: 'Copyright © 2026 SWAG. Eligibility limited to new users within 24h.'
            },
            'ja': {
                title: 'SWAGへようこそ！初心者ガイド',
                subtitle: 'たった1分で楽しみ方をマスターし、限定無料ダイヤをGETしよう！',
                step1: '無料ライブ配信に参加して、お気に入りのライバーと交流しよう！',
                step2: '長編動画やストーリーを探索し、最もプライベートな魅力を解禁！',
                step3: '下のボタンをクリックして無料ダイヤを受け取り、今すぐ体験！',
                cta: '今すぐ無料ダイヤを受け取る',
                footer: 'Copyright © 2026 SWAG. 受け取りは登録から24時間以内の新規ユーザー限定。'
            }
        };

        // 2. i18n Logic
        function changeLanguage(lang) {
            const texts = TRANSLATIONS[lang] || TRANSLATIONS['zh-TW'];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (texts[key]) {
                    el.textContent = texts[key];
                }
            });
        }

        // 3. User ID Parsing (Robust Iframe Defense Strategy)
        function getUserId() {
            let userId = null;

            // Strategy 1: URL Query String
            try {
                const params = new URLSearchParams(window.location.search);
                if (params.has('user_id')) return params.get('user_id');
            } catch (e) { console.warn('Query Parse Error', e); }

            // Strategy 2: URL Hash Params
            try {
                const hashParams = new URLSearchParams(window.location.hash.substring(1));
                if (hashParams.has('user_id')) return hashParams.get('user_id');
            } catch (e) { console.warn('Hash Parse Error', e); }

            // Strategy 3: Parent Window URL (Only works if Same-Origin)
            try {
                if (window.parent !== window) {
                    const parentUrl = new URL(window.parent.location.href);
                    if (parentUrl.searchParams.has('user_id')) return parentUrl.searchParams.get('user_id');
                }
            } catch (e) { 
                // Quietly handle Cross-Origin Resource Sharing (CORS) security exceptions
            }

            // Strategy 4: Document Referrer
            try {
                if (document.referrer) {
                    const refUrl = new URL(document.referrer);
                    if (refUrl.searchParams.has('user_id')) return refUrl.searchParams.get('user_id');
                }
            } catch (e) { console.warn('Referrer Parse Error', e); }

            // Strategy 5: Regex Fallback (Violent Search on full URL string)
            try {
                const fullUrl = window.location.href;
                const match = fullUrl.match(/[?&#]user_id=([^&#]+)/i);
                if (match && match[1]) return match[1];
            } catch (e) { console.warn('Regex Parse Error', e); }

            return null; // Return null if totally not found
        }

        // 4. CTA Action Routing
        function handleCTAClick() {
            const userId = getUserId();
            const baseUrl = 'https://swag.live/';
            const campaignId = 'nu_free_diamonds';
            
            let targetUrl = `${baseUrl}?campaign-id=${campaignId}`;
            if (userId) {
                targetUrl += `&user_id=${encodeURIComponent(userId)}`;
            }

            // Execute redirect
            // If inside Iframe, attempt to redirect the parent, fallback to self if cross-origin restricts.
            try {
                if (window.top && window.top !== window) {
                    window.top.location.href = targetUrl;
                } else {
                    window.location.href = targetUrl;
                }
            } catch (e) {
                window.location.href = targetUrl;
            }
        }

        // 5. App Initialization & Fake Loading Animation (Skeleton to Real Content Smoothly)
        document.addEventListener("DOMContentLoaded", () => {
            // Setup default Language based on browser config or default to 'zh-TW'
            const browserLang = navigator.language || navigator.userLanguage;
            let defaultLang = 'zh-TW';
            if (browserLang.includes('zh-CN')) defaultLang = 'zh-CN';
            else if (browserLang.includes('en')) defaultLang = 'en';
            else if (browserLang.includes('ja')) defaultLang = 'ja';
            
            document.getElementById('langSelect').value = defaultLang;
            changeLanguage(defaultLang);

            // Simulate parsing and initial asset loading delay (800ms)
            setTimeout(() => {
                document.getElementById('skeleton-view').style.display = 'none';
                
                const realContent = document.getElementById('real-content');
                const ctaContainer = document.getElementById('cta-container');
                
                realContent.classList.add('show-content');
                ctaContainer.style.display = 'flex';
                
                // Small trick to ensure CSS transition works from display:none
                setTimeout(() => {
                    ctaContainer.style.opacity = '1';
                }, 50);

            }, 800);
        });
    </script>
</body>
</html>
