        /* ==========================================
           1. CSS Variables & Reset (Mobile First)
           ========================================== */
        :root {
            --bg-dark: #09090b;
            --brand-primary: #ff2a5f;
            --brand-secondary: #9d2aff;
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.65);
            --glass-bg: rgba(24, 24, 27, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --skeleton-bg: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* ==========================================
           2. Modern Dark Mode & Fluid Background
           ========================================== */
        .fluid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: var(--bg-dark);
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.4;
            animation: float 12s infinite alternate ease-in-out;
        }

        .blob-1 {
            top: -10%; left: -20%;
            width: 300px; height: 300px;
            background: var(--brand-primary);
        }

        .blob-2 {
            bottom: -10%; right: -20%;
            width: 350px; height: 350px;
            background: var(--brand-secondary);
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, 60px) scale(1.1); }
        }

        /* ==========================================
           3. Layout & Header
           ========================================== */
        .container {
            position: relative;
            padding: 24px 20px 140px 20px; /* Increased bottom padding for floating CTA */
            max-width: 600px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 24px;
        }

        .lang-switcher {
            appearance: none;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            outline: none;
        }

        .hero-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-subtitle {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        /* ==========================================
           4. Enhanced Content Sections (Conversion Paths)
           ========================================== */
        .section-title {
            font-size: 1.15rem;
            font-weight: 700;
            margin: 24px 0 12px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Section 1: Creators (Horizontal Scroll) */
        .horizontal-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 12px;
            scroll-snap-type: x mandatory;
            margin-right: -20px; /* Bleed to right edge */
            padding-right: 20px;
        }
        .horizontal-scroll::-webkit-scrollbar {
            display: none;
        }
        
        .creator-card {
            flex: 0 0 110px;
            scroll-snap-align: start;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        
        .avatar {
            font-size: 2rem;
            width: 56px; height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border: 1px solid var(--glass-border);
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 8px;
        }
        
        .creator-name { font-size: 0.85rem; font-weight: 700; margin-bottom: 4px; }
        .badge {
            font-size: 0.65rem; font-weight: bold;
            background: rgba(255, 42, 95, 0.15);
            color: #ff4d79;
            padding: 2px 8px; border-radius: 6px;
            margin-bottom: 12px; white-space: nowrap;
        }

        /* Section 2: Video List */
        .video-list { display: flex; flex-direction: column; gap: 8px; }
        .video-item {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            padding: 12px; border-radius: 12px;
            display: flex; align-items: center; gap: 12px;
        }
        .video-item.premium {
            border-color: rgba(255, 215, 0, 0.4);
            background: linear-gradient(90deg, rgba(255,215,0,0.08), transparent);
        }
        .video-cover {
            font-size: 1.2rem;
            width: 44px; height: 44px;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            display: flex; justify-content: center; align-items: center; flex-shrink: 0;
        }
        .video-title { font-size: 0.9rem; font-weight: 500; }
        .video-title.highlight { color: #ffd700; font-weight: 700; }

        /* Section 3 & 4: Promo Banners */
        .banner-card {
            margin-top: 24px; padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(16px);
        }
        .banner-card.gold {
            border-color: rgba(255, 215, 0, 0.3);
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), rgba(24, 24, 27, 0.8));
        }
        .banner-card.purple {
            border-color: rgba(157, 42, 255, 0.3);
            background: linear-gradient(135deg, rgba(157, 42, 255, 0.15), rgba(24, 24, 27, 0.8));
        }
        .banner-card h2 { font-size: 1.2rem; margin-bottom: 6px; font-weight: 800; }
        .banner-card p { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 16px; }

        /* Buttons within content */
        .btn-sm {
            background: var(--brand-primary); color: #fff;
            border: none; padding: 6px 12px; border-radius: 100px;
            font-size: 0.8rem; font-weight: bold; cursor: pointer; width: 100%;
        }
        .btn-full {
            width: 100%; padding: 12px; border-radius: 100px; border: none;
            font-size: 0.95rem; font-weight: bold; cursor: pointer; text-align: center;
        }
        .btn-full.outline {
            background: rgba(255,255,255,0.05); border: 1px solid var(--brand-primary);
            color: var(--brand-primary); margin-top: 8px;
        }
        .btn-full.gold-fill {
            background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000;
        }
        .btn-full.purple-fill {
            background: linear-gradient(135deg, var(--brand-secondary), #5a189a); color: #fff;
        }

        /* ==========================================
           5. Floating Main CTA
           ========================================== */
        .cta-wrapper {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            padding: 20px 20px 32px 20px;
            background: linear-gradient(to top, #000000 50%, transparent);
            display: flex; flex-direction: column; align-items: center; z-index: 100;
        }
        .cta-btn {
            width: 100%; max-width: 560px; padding: 16px;
            border-radius: 100px; border: none;
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
            color: #fff; font-size: 1.15rem; font-weight: bold;
            box-shadow: 0 8px 32px rgba(255, 42, 95, 0.4);
            cursor: pointer; animation: pulse-glow 2s infinite; transition: transform 0.1s;

        .cta-btn:active { transform: scale(0.97); }
        .footer-text { font-size: 0.7rem; color: var(--text-muted); margin-top: 12px; text-align: center; }

        @keyframes pulse-glow {

            70% { box-shadow: 0 0 0 15px rgba(255, 42, 95, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 42, 95, 0); }

        /* ==========================================

        }
        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        #real-content { opacity: 0; transition: opacity 0.6s ease-in-out; display: none; }
        .show-content { opacity: 1 !important; display: block !important; }

        // 2. i18n Logic
        function changeLanguage(lang) {
            const texts = TRANSLATIONS[lang] || TRANSLATIONS['zh-TW'];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (texts[key]) {
                    el.textContent = texts[key];
                }
            });
        }

        // 3. User ID Parsing (Robust Iframe Defense Strategy)
        function getUserId() {
            try {
                const params = new URLSearchParams(window.location.search);
                if (params.has('user_id')) return params.get('user_id');
            } catch (e) { }

            try {
                const hashParams = new URLSearchParams(window.location.hash.substring(1));
                if (hashParams.has('user_id')) return hashParams.get('user_id');
            } catch (e) { }

            try {
                if (window.parent !== window) {
                    const parentUrl = new URL(window.parent.location.href);
                    if (parentUrl.searchParams.has('user_id')) return parentUrl.searchParams.get('user_id');
                }
            } catch (e) { }

            try {
                if (document.referrer) {
                    const refUrl = new URL(document.referrer);
                    if (refUrl.searchParams.has('user_id')) return refUrl.searchParams.get('user_id');
                }
            } catch (e) { }

            try {
                const fullUrl = window.location.href;
                const match = fullUrl.match(/[?&#]user_id=([^&#]+)/i);
                if (match && match[1]) return match[1];
            } catch (e) { }

            return null;
        }

        // 4. CTA Action Routing (Universal click handler to maximize Conversion Rate)
        function handleCTAClick() {
            const userId = getUserId();
            const baseUrl = 'https://swag.live/';
            const campaignId = 'nu_free_diamonds';
            
            let targetUrl = `${baseUrl}?campaign-id=${campaignId}`;
            if (userId) {
                targetUrl += `&user_id=${encodeURIComponent(userId)}`;
            }

            try {
                if (window.top && window.top !== window) {
                    window.top.location.href = targetUrl;
                } else {
                    window.location.href = targetUrl;
                }
            } catch (e) {
                window.location.href = targetUrl;
            }
        }

        // 5. App Initialization & Fake Loading Animation
        document.addEventListener("DOMContentLoaded", () => {
            const browserLang = navigator.language || navigator.userLanguage;
            let defaultLang = 'zh-TW';
            if (browserLang.includes('zh-CN')) defaultLang = 'zh-CN';
            else if (browserLang.includes('en')) defaultLang = 'en';
            else if (browserLang.includes('ja')) defaultLang = 'ja';
            
            document.getElementById('langSelect').value = defaultLang;
            changeLanguage(defaultLang);

            setTimeout(() => {
                document.getElementById('skeleton-view').style.display = 'none';
                
                const realContent = document.getElementById('real-content');
                const ctaContainer = document.getElementById('cta-container');
                
                realContent.classList.add('show-content');
                ctaContainer.style.display = 'flex';
                
                setTimeout(() => {
                    ctaContainer.style.opacity = '1';
                }, 50);

            }, 800);
        });
    </script>
</body>
</html>
